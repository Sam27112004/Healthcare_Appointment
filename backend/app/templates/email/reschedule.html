<!DOCTYPE html>
<html>
<head><style>body { font-family: Arial, sans-serif; color: #333; line-height: 1.6; }</style></head>
<body>
    <h2>Appointment Rescheduled</h2>
    <p>Hi {{ patient_name }},</p>
    <p>Your appointment with <strong>{{ doctor_name }}</strong> has been successfully rescheduled.</p>
    <p><strong>Old Time:</strong> {{ old_date }} at {{ old_time }}</p>
    <p><strong>New Time:</strong> {{ new_date }} at {{ new_time }}</p>
    <p>We look forward to seeing you.</p>
    <p>Thanks,<br/>Healthcare Appointment Manager</p>
</body>
</html>
